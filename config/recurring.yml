production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every week

  matches_pl:
    class: MatchesJob
    args: ['PL', 2025]
    schedule: every 5 minutes  
  competitions_pl:
    class: CompetitionsJob
    args: ['PL']
    schedule: every hour

  matches_wc:
    class: MatchesJob
    args: ['WC', 2026]
    schedule: every day
  competitions_wc:
    class: CompetitionsJob
    args: ['WC']
    schedule: every day

  reminder_emails:
    class: ReminderJob
    schedule: every day at 7