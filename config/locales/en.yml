      deadline_example_badge: "Example"
      deadline_example_text: "If a match starts at 19:00, predictions lock automatically at 18:50. After that, predictions cannot be updated or saved."
      core_concept_title: "How the system works"
      core_concept_description: "Points are calculated automatically in three categories after the match ends. The system rewards exact outcomes richly while reducing points as your prediction deviates from the final score."
      points_distribution_title: "Points distribution"
      tier_1_points: "25"
      tier_1_title: "Exact result"
      tier_1_description: "Both home and away goals exactly match the final score."
      tier_2_points: "10-20"
      tier_2_title: "Correct outcome (Home Win / Draw / Away Win)"
      tier_2_description: "You predict the right winner or draw based on the sign. You start at 20 points and lose points for errors in total goals and goal difference, but never fall below 10 points when the sign is correct."
      tier_3_points: "0-4"
      tier_3_title: "Distance points (The Scavenger)"
      tier_3_description: "If you miss the result, you can still salvage up to 4 points when your predicted goals are close to the final score."
      example_a_title: "Example A: Match ends in a win (2 - 1)"
      example_a_subtitle: "If the final score is 2 - 1:"
      example_a_exact_label: "Your prediction: 2 - 1"
      example_a_exact_points: "+25 points"
      example_a_exact_description: "Exact result earns the full bonus."
      example_a_correct_outcome_imperfect_gd_label: "Your prediction: 3 - 1"
      example_a_correct_outcome_imperfect_gd_points: "+17 points"
      example_a_correct_outcome_imperfect_gd_description: "Correct outcome (home win). The error is 1 home goal and 1 goal difference (20 - (1 × 2) - 1 = 17)."
      example_a_correct_outcome_perfect_total_label: "Your prediction: 1 - 0"
      example_a_correct_outcome_perfect_total_points: "+16 points"
      example_a_correct_outcome_perfect_total_description: "Correct outcome (home win). The goal difference is correct (+1), but the total goals are off by 2."
      example_a_correct_outcome_perfect_gd_label: "Your prediction: 4 - 3"
      example_a_correct_outcome_perfect_gd_points: "+12 points"
      example_a_correct_outcome_perfect_gd_description: "Correct outcome (home win) and correct goal difference (+1). Even though the total goals are high, the right margin saves the prediction."
      example_a_correct_outcome_high_error_label: "Your prediction: 4 - 0"
      example_a_correct_outcome_high_error_points: "+11 points"
      example_a_correct_outcome_high_error_description: "Correct outcome (home win). A large goal error reduces points but does not drop the total below the minimum for the sign."
      example_a_wrong_outcome_high_scavenger_label: "Your prediction: 1 - 1"
      example_a_wrong_outcome_high_scavenger_points: "+3 points"
      example_a_wrong_outcome_high_scavenger_description: "Wrong result (draw), but distance points still give 3 because the total goal error was only 1 goal on the home side (4 - 1 = 3)."
      example_a_wrong_outcome_precise_label: "Your prediction: 1 - 2"
      example_a_wrong_outcome_precise_points: "+2 points"
      example_a_wrong_outcome_precise_description: "Wrong result (away win instead of home win), yet distance points still give 2 because your total goal error was only 2 goals (4 - 2 = 2)."
      example_b_title: "Example B: Match ends in a draw (1 - 1)"
      example_b_subtitle: "If the final score is 1 - 1:"
      example_b_exact_draw_label: "Your prediction: 1 - 1"
      example_b_exact_draw_points: "+25 points"
      example_b_exact_draw_description: "Exact draw earns the full bonus."
      example_b_symmetrical_draw_label: "Your prediction: 2 - 2"
      example_b_symmetrical_draw_points: "+16 points"
      example_b_symmetrical_draw_description: "Correct result (draw). The difference fits (0), but the total goals are two too many."
      example_b_wrong_outcome_scavenger_label: "Your prediction: 2 - 1"
      example_b_wrong_outcome_scavenger_points: "+3 points"
      example_b_wrong_outcome_scavenger_description: "Wrong result (home win), but distance points still give 3 because the total goal error was only 1 goal."

