is:
  date:
    abbr_day_names:
    - sun
    - mán
    - þri
    - mið
    - fim
    - fös
    - lau
    abbr_month_names:
    -
    - jan
    - feb
    - mar
    - apr
    - maí
    - jún
    - júl
    - ágú
    - sep
    - okt
    - nóv
    - des
    day_names:
    - sunnudaginn
    - mánudaginn
    - þriðjudaginn
    - miðvikudaginn
    - fimmtudaginn
    - föstudaginn
    - laugardaginn
    formats:
      default: ! '%e. %b %Y'
      form: '%d-%m-%Y'
      slug: '%Y-%m-%d'
      long: ! '%e. %B %Y'
      short: ! '%e. %b'
    month_names:
    -
    - janúar
    - febrúar
    - mars
    - apríl
    - maí
    - júní
    - júlí
    - ágúst
    - september
    - október
    - nóvember
    - desember
    order:
    - :day
    - :month
    - :year
  datetime:
    distance_in_words:
      about_x_hours:
        one: u.þ.b. 1 klukkustund
        other: u.þ.b. %{count} klukkustund/ir
      about_x_months:
        one: u.þ.b. 1 mánuður
        other: u.þ.b. %{count} mánuðir
      about_x_years:
        one: u.þ.b. 1 ár
        other: u.þ.b. %{count} ár
      almost_x_years:
        one: næstum 1 ár
        other: næstum %{count} ár
      half_a_minute: hálf mínúta
      less_than_x_minutes:
        one: minna en 1 mínúta
        other: minna en %{count} mínúta/ur
      less_than_x_seconds:
        one: minna en 1 sekúnda
        other: minna en %{count} sekúndu/r
      over_x_years:
        one: meira en 1 ár
        other: meira en %{count} ár
      x_days:
        one: 1 dagur
        other: ! '%{count} dagar'
      x_minutes:
        one: 1 mínúta
        other: ! '%{count} mínútur'
      x_months:
        one: 1 mánuður
        other: ! '%{count} mánuðir'
      x_seconds:
        one: 1 sekúnda
        other: ! '%{count} sekúndur'
    prompts:
      day: Dagur
      hour: Klukkustund
      minute: Mínúta
      month: Mánuður
      second: Sekúnda
      year: Ár
  errors: &errors
    format: ! '%{attribute} %{message}'
    messages:
      accepted: þarf að vera tekið gilt
      blank: verður að vera valið
      confirmation: er ekki eins
      empty: má ekki vera tómt
      equal_to: þarf að vera jafngilt %{count}
      even: þarf að vera slétt tala
      exclusion: er frátekið
      greater_than: þarf að vera stærri en %{count}
      greater_than_or_equal_to: þarf að vera stærri en eða jafngilt %{count}
      inclusion: er ekki í listanum
      invalid: er ógilt
      less_than: þarf að vera minna en %{count}
      less_than_or_equal_to: þarf að vera minna en eða jafngilt %{count}
      not_a_number: er ekki tala
      not_an_integer: þarf að vera heiltala
      odd: þarf að vera oddatala
      record_invalid: ! 'Villur: %{errors}'
      taken: er þegar í notkun
      too_long:
        one: er of langt (má mest vera 1 stafur)
        other: er of langt (má mest vera %{count} stafir)
      too_short:
        one: er of stutt (má minnst vera 1 stafur)
        other: er of stutt (má minnst vera %{count} stafir)
      wrong_length:
        one: er af rangri lengd (má mest vera 1 stafur)
        other: er af rangri lengd (má mest vera %{count} stafir)
    template:
      body: ! 'Villur fundust í eftirfarandi dálkum:'
      header:
        one: Ekki var hægt að vista %{model} vegna einnar villu.
        other: Ekki var hægt að vista %{model} vegna %{count} villna.
  helpers:
    select:
      prompt: Veldu
    submit:
      create: Búa til %{model}
      submit: Vista %{model}
      update: Uppfæra %{model}
  number:
    currency:
      format:
        delimiter: ! ','
        format: ! '%n %u'
        precision: 2
        separator: ','
        significant: false
        strip_insignificant_zeros: false
        unit: kr.
    format:
      delimiter: ! '.'
      precision: 1
      separator: ','
      significant: false
      strip_insignificant_zeros: false
    human:
      decimal_units:
        format: ! '%n %u'
        units:
          billion:
            one: milljarður
            other: milljarðar
          million:
            one: milljón
            other: milljónir
          quadrillion:
            one: billjarður
            other: billjarðar
          thousand: þúsund
          trillion:
            one: billjón
            other: billjónir
          unit: ''
      format:
        delimiter: ''
        precision: 2
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: ! '%n %u'
        units:
          byte:
            one: bæti
            other: bæti
          gb: GB
          kb: KB
          mb: MB
          tb: TB
    percentage:
      format:
        delimiter: ''
        precision: 0
    precision:
      format:
        delimiter: ''
  support:
    array:
      last_word_connector: ! ' og '
      two_words_connector: ! ' og '
      words_connector: ! ', '
  time:
    am: ''
    formats:
      default: ! '%e. %B %Y kl. %H:%M'
      long: ! '%a %e. %b %Y kl. %H:%M'
      short: ! '%e. %b %H:%M'
      only_time: ! '%H:%M'
      date: ! '%e. %B %Y'
      date_short: ! '%e. %b %Y'
      form: '%d-%m-%Y'
      slug: '%Y-%m-%d'
      slug_with_time: '%Y-%m-%d-%H:%M'
      month_and_year: '%b %Y'
      year: '%Y'
    pm: ''
